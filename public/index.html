<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#111111" />
    <title>mise — learn to cook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
    <!-- Adobe Fonts (Typekit) kit — provides "filmotype-honey"
         (item-card NAMES, weight 300) and "beverly-drive-right"
         (item-card SUBHEADERS). Two distinct faces so the row's
         header / subheader read as two voices. -->
    <link rel="stylesheet" href="https://use.typekit.net/cnf4qlv.css" />
    <style>
      /* Pale Martini — custom display face for MCM headers.
         Self-hosted (woff2 from public/fonts/) instead of routed
         through Google Fonts since this is a non-Google
         typeface. font-display: swap renders fallback Truculenta
         /Futura first so the page paints fast, then re-renders
         in Pale Martini once the file lands. */
      @font-face {
        font-family: "Pale Martini";
        src: url("/fonts/PaleMartini.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #111; color: #f5f5f0; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { display: none; }
      input[type=number]::-webkit-outer-spin-button,
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }

      /* Tap feedback — every button in the app gets a springy press-down
         so taps register as physical events. Scale 0.92 on press with
         a 120ms cubic-bezier that overshoots on release (back-ease) so
         the button feels like it's made of something. Applies to both
         <button> and role="button" so our tappable <div>s get it too.
         Vestibular safety valve at the bottom. */
      button,
      [role="button"] {
        transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
                    opacity 0.15s ease,
                    box-shadow 0.2s ease,
                    background 0.2s ease,
                    border-color 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      button:active:not(:disabled),
      [role="button"]:active:not([aria-disabled="true"]) {
        transform: scale(0.92);
        transition: transform 0.06s ease-out;
      }

      /* Focus ring — shows only on keyboard focus so touch users don't
         see a lingering outline after every tap. */
      button:focus-visible,
      [role="button"]:focus-visible {
        outline: 2px solid #f5c842;
        outline-offset: 2px;
      }

      /* Brand halo pulse — primary CTAs (gold buttons, "COOK IT",
         "STOCK IT", "SCAN", etc.) that opt in via the `mise-cta`
         class get a breathing gold glow so they don't just sit
         there inert. 3.2s cycle with a gentle sine so it reads as
         ambient life, not flashing. The glow stays subtle at rest
         and snaps brighter on hover; press collapses it with the
         scale tap transform. */
      @keyframes miseHaloPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(245, 200, 66, 0.35),
                               0 0 22px 0 rgba(245, 200, 66, 0.20); }
        50%      { box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.00),
                               0 0 32px 4px rgba(245, 200, 66, 0.30); }
      }
      .mise-cta { animation: miseHaloPulse 3.2s ease-in-out infinite; }
      .mise-cta:hover { filter: brightness(1.05); }

      /* Scan-halo — applied to the upc_scanner.svg image at the
         right edge of the AddDraftSheet's Name input to flag
         scanning as the preferred / premium add path. Uses
         filter: drop-shadow so the glow follows the SVG's
         baked-in circle (rather than the rectangular bounding
         box). 4s cycle to read as ambient breath rather than
         attention-grabbing. */
      @keyframes miseScanHalo {
        0%, 100% { filter: drop-shadow(0 1px 2px rgba(30,30,30,0.18))
                          drop-shadow(0 0 6px rgba(127,180,212,0.55)); }
        50%      { filter: drop-shadow(0 1px 2px rgba(30,30,30,0.18))
                          drop-shadow(0 0 14px rgba(127,180,212,0.85)); }
      }
      .mise-scan-halo { animation: miseScanHalo 4s ease-in-out infinite; }

      /* Fade-in-up — a universal mount animation for mount-once rows
         in lists (scan-draft rows, pantry tiles, picker options). Used
         by the `.mise-fade-in` utility class with a CSS var for
         staggered delay so any list can cascade without needing a
         framer-motion wrapper. */
      @keyframes miseFadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      /* fill-mode is `backwards` (not `both`): during the per-row
         delay the element is hidden at the `from` state; AFTER the
         animation the natural style (inline opacity / transform)
         takes over. Critical for scan-draft rows whose inline style
         dims deselected items to opacity 0.4 — with `both` the
         animation would lock them at 1 forever. */
      .mise-fade-in {
        animation: miseFadeInUp 0.36s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        animation-delay: var(--mise-delay, 0ms);
      }

      /* Chip pick celebration — a gentle scale-up + glow pulse fired
         once when a chip becomes "active" (e.g. user picks a CATEGORY
         option in the ModalSheet). Opt in via `.mise-picked` on the
         just-activated element. 420ms one-shot so it doesn't compete
         with the list's staggered mount. */
      @keyframes misePicked {
        0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(245, 200, 66, 0); }
        30%  { transform: scale(1.06); box-shadow: 0 0 0 6px rgba(245, 200, 66, 0.18); }
        100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(245, 200, 66, 0); }
      }
      .mise-picked { animation: misePicked 0.42s ease-out both; }

      /* Emoji bob — tiny playful float that inline-block emojis can
         opt into by adding `.mise-emoji-bob`. Used on the hero emoji
         of ItemCard, scan-draft rows, picker rows. Kept imperceptibly
         slow (4s) so it reads as "alive" not "distracting". */
      @keyframes miseEmojiBob {
        0%, 100% { transform: translateY(0) rotate(-0.5deg); }
        50%      { transform: translateY(-2px) rotate(0.5deg); }
      }
      .mise-emoji-bob {
        display: inline-block;
        animation: miseEmojiBob 4s ease-in-out infinite;
        transform-origin: center bottom;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
