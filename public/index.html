<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#111111" />
    <title>mise — learn to cook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #111; color: #f5f5f0; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { display: none; }
      input[type=number]::-webkit-outer-spin-button,
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }

      /* Tap feedback — every button in the app gets a subtle press-down
         scale so taps feel tactile instead of dead-flat. Kept tiny (4%
         scale) and brief (80ms) so it reads as feedback, not animation
         theater. Also applied to role=button for the places we render
         tappable divs. Honors prefers-reduced-motion so users with
         vestibular sensitivity get instant state changes. */
      button,
      [role="button"] {
        transition: transform 0.08s ease, opacity 0.12s ease;
        -webkit-tap-highlight-color: transparent;
      }
      button:active:not(:disabled),
      [role="button"]:active:not([aria-disabled="true"]) {
        transform: scale(0.96);
      }

      /* Focus ring — shows only on keyboard focus so touch users don't
         see a lingering outline after every tap. Modern browsers only. */
      button:focus-visible,
      [role="button"]:focus-visible {
        outline: 2px solid #f5c842;
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
